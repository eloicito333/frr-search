<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="./js/index.js" defer></script>
    <link rel="icon" href="./assets/flying-bird-logo.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css" />
    <link rel="stylesheet" href="./css/index.css">
    <title>FrrSearch - Home</title>
</head>

<body>
    <header>
        <nav>
            <div class="menu-icon">
                <span class="fas fa-bars"></span>
            </div>
            <h1 class="logo">
                FrrSearch
            </h1>
            <div class="nav-items">
                <li><a href="/">Home</a></li>
                <li><a href="" aria-disabled="true">About</a></li>
                <li><a href="" aria-disabled="true">Upgrade</a></li>
                <li><a href="" aria-disabled="true">Contact</a></li>
                <li><a href="/feedback">Feedback</a></li>
            </div>
            <div class="cancel-icon">
                <span class="fas fa-times"></span>
            </div>
        </nav>
    </header>
    <main>
        <div id="title-div">
            <h2>
                FrrSearch
            </h2>
            <span>
                Preliminary Version
            </span>
            <hr>
            <span>
                Definitive Version <b>Comings Soon</b>
            </span>
        </div>
        <form id="search-form">
            <input type="search" id="search-form-url" class="search-data" placeholder="Search the web freely" name="url" required>
            <button type="submit" class="search-btn fas fa-search"></button>
        </form>
    </main>
    <script>
        const menuBtn = document.querySelector(".menu-icon span");
        const cancelBtn = document.querySelector(".cancel-icon");
        const items = document.querySelector(".nav-items");

        menuBtn.onclick = () => {
            items.classList.add("active");
            menuBtn.classList.add("hide");
            cancelBtn.classList.add("show");
        }
        cancelBtn.onclick = () => {
            items.classList.remove("active");
            menuBtn.classList.remove("hide");
            cancelBtn.classList.remove("show");
            cancelBtn.style.color = "#ff3d00";
        }
    </script>
</body>

</html>
